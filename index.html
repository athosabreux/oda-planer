<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#eee" />
<title>ODA Suites Planer · Weinmarkt Luzern</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300,0,0" />
<style>
:root {
  /* Brand */
  --oda-offwhite: #eee;
  --oda-red: #51080d;
  --oda-red-dark: #280704;
  --oda-brown: #3d2216;
  --oda-dark: #1a1a1a;
  --oda-green: #606f5a;
  --oda-blue: #4a585e;
  --oda-blue-light: #86929b;

  /* Light Color Scheme */
  --bg: #eee;
  --bg-elev: #fff;
  --bg-subtle: #f6f6f5;
  --fg: #1a1a1a;
  --fg-muted: rgba(26, 26, 26, 0.65);
  --fg-subtle: rgba(26, 26, 26, 0.42);
  --border: rgba(26, 26, 26, 0.10);
  --border-strong: rgba(26, 26, 26, 0.20);
  --hover: rgba(26, 26, 26, 0.05);
  --accent: #1a1a1a;
  --accent-fg: #eee;
  --accent-hover: #2a2a2a;
  --brand: #51080d;
  --danger: #51080d;
  --warning: #b88a3e;

  /* System Status — wie Webflow System Error/Success/Info/Warning,
     mit Hintergrund (15% opacity), Border + Text in voller Farbe */
  --sys-info: #4a585e;
  --sys-info-bg: rgba(74, 88, 94, 0.12);
  --sys-info-border: rgba(74, 88, 94, 0.32);

  --sys-progress: #2c6cb0;
  --sys-progress-bg: rgba(44, 108, 176, 0.14);
  --sys-progress-border: rgba(44, 108, 176, 0.38);

  --sys-warn: #b88a3e;
  --sys-warn-bg: rgba(184, 138, 62, 0.16);
  --sys-warn-border: rgba(184, 138, 62, 0.45);

  --sys-error: #51080d;
  --sys-error-bg: rgba(81, 8, 13, 0.10);
  --sys-error-border: rgba(81, 8, 13, 0.32);

  --sys-success: #4f6f49;
  --sys-success-bg: rgba(79, 111, 73, 0.16);
  --sys-success-border: rgba(79, 111, 73, 0.42);

  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 100vw;
  --shadow-sm: 0 1px 2px rgba(26,26,26,.06), 0 1px 3px rgba(26,26,26,.04);
  --shadow-md: 0 4px 12px rgba(26,26,26,.08);
  --shadow-lg: 0 12px 32px rgba(26,26,26,.12);
  --transition: 0.4s cubic-bezier(0.625, 0.05, 0, 1);
}

html.dark, body.dark {
  --bg: #1a1a1a;
  --bg-elev: #232323;
  --bg-subtle: #1f1f1f;
  --fg: #eee;
  --fg-muted: rgba(238, 238, 238, 0.65);
  --fg-subtle: rgba(238, 238, 238, 0.42);
  --border: rgba(238, 238, 238, 0.10);
  --border-strong: rgba(238, 238, 238, 0.22);
  --hover: rgba(238, 238, 238, 0.06);
  --accent: #eee;
  --accent-fg: #1a1a1a;
  --accent-hover: #fff;
  --brand: #c47782;
  --danger: #d65560;
  --warning: #d6a052;

  --sys-info: #c6d0d6;
  --sys-info-bg: rgba(134, 146, 155, 0.16);
  --sys-info-border: rgba(134, 146, 155, 0.38);

  --sys-progress: #79b0e6;
  --sys-progress-bg: rgba(121, 176, 230, 0.16);
  --sys-progress-border: rgba(121, 176, 230, 0.4);

  --sys-warn: #e0b674;
  --sys-warn-bg: rgba(224, 182, 116, 0.16);
  --sys-warn-border: rgba(224, 182, 116, 0.4);

  --sys-error: #e08089;
  --sys-error-bg: rgba(224, 128, 137, 0.16);
  --sys-error-border: rgba(224, 128, 137, 0.4);

  --sys-success: #95c08e;
  --sys-success-bg: rgba(149, 192, 142, 0.18);
  --sys-success-border: rgba(149, 192, 142, 0.42);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 15px; line-height: 1.5;
  color: var(--fg); background: var(--bg);
  transition: background-color var(--transition), color var(--transition);
  -webkit-font-smoothing: antialiased;
}
button, input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
button { background: none; border: none; cursor: pointer; }
a { color: inherit; text-decoration: none; }

.material-symbols-rounded {
  font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
  user-select: none; vertical-align: middle; line-height: 1;
  font-size: 20px;
}
.material-symbols-rounded.sm { font-size: 16px; }
.material-symbols-rounded.lg { font-size: 24px; }
.material-symbols-rounded.xl { font-size: 32px; }
.material-symbols-rounded.fill {
  font-variation-settings: 'FILL' 1, 'wght' 300, 'GRAD' 0, 'opsz' 24;
}

.app { display: flex; flex-direction: column; min-height: 100vh; }

.topbar {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; gap: 16px;
  padding: 14px 24px;
  background: var(--bg-elev);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(10px);
}
.topbar-brand { display: flex; align-items: baseline; gap: 10px; font-weight: 600; }
.topbar-brand .brand-mark { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; color: var(--brand); }
.topbar-brand small { color: var(--fg-muted); font-weight: 400; font-size: 13px; }
.topbar-spacer { flex: 1; }
.topbar-actions { display: flex; align-items: center; gap: 8px; }

.badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: var(--radius-full);
  font-size: 12px; font-weight: 500;
  border: 1px solid var(--border);
  background: var(--bg-elev); white-space: nowrap;
}
.badge.ok { color: var(--sys-success); background: var(--sys-success-bg); border-color: var(--sys-success-border); }
.badge.warn { color: var(--sys-warn); background: var(--sys-warn-bg); border-color: var(--sys-warn-border); }
.badge.danger { color: var(--sys-error); background: var(--sys-error-bg); border-color: var(--sys-error-border); }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 8px 14px; border-radius: var(--radius-md);
  font-size: 14px; font-weight: 500;
  border: 1px solid var(--border-strong);
  background: var(--bg-elev); color: var(--fg);
  transition: all 0.2s ease; white-space: nowrap;
}
.btn:hover { background: var(--hover); border-color: var(--fg-muted); }
.btn.primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
.btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.btn.icon-only { width: 38px; height: 38px; padding: 0; }
.btn.small { padding: 6px 10px; font-size: 13px; gap: 4px; }
.btn.danger { color: var(--sys-error); border-color: var(--sys-error-border); background: transparent; }
.btn.danger:hover { background: var(--sys-error); color: white; border-color: var(--sys-error); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn .material-symbols-rounded { font-size: 18px; }
.btn.small .material-symbols-rounded { font-size: 16px; }

.tabs {
  display: flex; gap: 4px; padding: 4px 24px 0;
  background: var(--bg-elev);
  border-bottom: 1px solid var(--border);
  overflow-x: auto; scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 12px 14px; font-size: 14px; font-weight: 500;
  color: var(--fg-muted);
  border-bottom: 2px solid transparent;
  transition: all 0.2s ease; white-space: nowrap;
  display: inline-flex; align-items: center; gap: 8px;
}
.tab:hover { color: var(--fg); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab .material-symbols-rounded { font-size: 18px; }

.main { flex: 1; padding: 28px 24px 100px; max-width: 1600px; margin: 0 auto; width: 100%; }
/* Admin-Modus visuell hervorheben */
body.is-admin .topbar {
  background: linear-gradient(180deg, rgba(81, 8, 13, 0.04), var(--bg-elev));
  border-bottom: 2px solid var(--brand);
}
body.is-admin .topbar::before {
  content: 'ADMIN';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--brand);
  font-size: 0;
}
body.is-admin .topbar-brand .brand-mark::after {
  content: ' · ADMIN';
  font-size: 11px;
  font-weight: 700;
  color: var(--brand);
  letter-spacing: 0.08em;
  margin-left: 4px;
}
.topbar { position: relative; }

.login-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 4px 12px 4px 4px;
  border-radius: var(--radius-full);
  border: 1px solid var(--border-strong);
  background: var(--bg-elev);
  font-size: 13px; font-weight: 500;
  transition: all 0.2s ease;
  cursor: pointer;
  white-space: nowrap;
}
.login-pill:hover { background: var(--hover); border-color: var(--fg-muted); }
.login-pill .login-pill-avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--accent);
  color: var(--accent-fg);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  flex-shrink: 0;
}
.login-pill .material-symbols-rounded {
  font-size: 14px; color: var(--fg-muted);
}
body.is-admin .login-pill {
  background: var(--brand);
  color: white;
  border-color: var(--brand);
}
body.is-admin .login-pill .login-pill-avatar {
  background: white;
  color: var(--brand);
}
body.is-admin .login-pill .material-symbols-rounded { color: white; }

/* Floating Theme Toggle - nur auf mobile */
.theme-fab {
  display: none;
  position: fixed;
  bottom: 24px; left: 24px;
  width: 48px; height: 48px;
  border-radius: 50%;
  background: var(--bg-elev);
  border: 1px solid var(--border-strong);
  box-shadow: var(--shadow-md);
  align-items: center; justify-content: center;
  z-index: 40;
}
.theme-fab .material-symbols-rounded { font-size: 22px; }

@media (max-width: 768px) {
  .topbar { padding: 10px 14px; gap: 8px; }
  .topbar-brand small { display: none; }
  .topbar-brand .brand-mark { font-size: 16px; }
  body.is-admin .topbar-brand .brand-mark::after { font-size: 9px; }
  #theme-btn { display: none !important; }
  .theme-fab { display: flex; }
  .tabs { padding: 4px 12px 0; }
  .tab { padding: 12px 10px; }
  .main { padding: 16px 12px 100px; }
  .login-pill { padding: 4px 10px 4px 4px; font-size: 13px; }
}

.modal-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  padding: 20px; backdrop-filter: blur(4px);
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--bg-elev);
  border-radius: var(--radius-xl);
  max-width: 480px; width: 100%;
  max-height: 92vh; overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
.modal.wide { max-width: 760px; }
@keyframes modalIn {
  from { opacity: 0; transform: translateY(20px) scale(0.96); }
  to { opacity: 1; transform: none; }
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px; border-bottom: 1px solid var(--border); gap: 12px;
}
.modal-header h2 { font-size: 18px; font-weight: 600; flex: 1; }
.modal-body { padding: 24px; }
.modal-footer {
  display: flex; gap: 8px; justify-content: flex-end;
  padding: 16px 24px; border-top: 1px solid var(--border);
  flex-wrap: wrap;
}

.form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.form-group label { font-size: 13px; font-weight: 500; color: var(--fg-muted); }
.form-group input, .form-group select, .form-group textarea {
  padding: 10px 12px; border-radius: var(--radius-md);
  border: 1px solid var(--border-strong);
  background: var(--bg); color: var(--fg);
  transition: border-color 0.2s ease;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: var(--accent);
}
.form-group textarea { resize: vertical; min-height: 80px; font-family: inherit; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

.floor-chips, .chip-list { display: flex; flex-wrap: wrap; gap: 6px; }
.floor-chip, .input-chip {
  padding: 7px 14px; border-radius: var(--radius-full);
  border: 1px solid var(--border-strong);
  background: var(--bg); font-size: 13px; font-weight: 500;
  transition: all 0.2s ease; cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
}
.floor-chip.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
.input-chip .material-symbols-rounded { font-size: 14px; }
.input-chip-x { color: var(--fg-muted); cursor: pointer; padding: 0 0 0 2px; }
.input-chip-x:hover { color: var(--sys-error); }

/* Dashboard KPIs */
.kpi-grid {
  display: grid; gap: 16px;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  margin-bottom: 32px;
}
.kpi-card {
  padding: 20px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.kpi-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.kpi-label {
  font-size: 12px; color: var(--fg-muted);
  margin-bottom: 8px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.05em;
  display: flex; align-items: center; gap: 6px;
}
.kpi-value { font-size: 32px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.1; }
.kpi-detail { font-size: 12px; color: var(--fg-subtle); margin-top: 8px; }
.kpi-card.accent { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
.kpi-card.accent .kpi-label, .kpi-card.accent .kpi-detail { color: var(--accent-fg); opacity: 0.85; }
.kpi-card.danger .kpi-value { color: var(--sys-error); }

.progress-bar { height: 6px; background: var(--border); border-radius: var(--radius-full); overflow: hidden; margin-top: 10px; }
.kpi-card.accent .progress-bar { background: rgba(238,238,238,0.2); }
.progress-bar-fill { height: 100%; background: var(--accent); border-radius: var(--radius-full); transition: width 0.6s ease; }
.kpi-card.accent .progress-bar-fill { background: var(--accent-fg); }

.section { margin-bottom: 32px; }
.section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 12px; }
.section-head h2 { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; display: flex; align-items: center; gap: 8px; }
.section-head .actions { display: flex; gap: 8px; }

/* Task table */
.task-table-wrap {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.task-filter-bar {
  display: flex; gap: 8px; padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap; align-items: center;
  background: var(--bg-subtle);
}
.task-filter-bar .search-input { flex: 1; min-width: 200px; position: relative; }
.task-filter-bar .search-input .material-symbols-rounded {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--fg-subtle);
}
.task-filter-bar .search-input input {
  width: 100%; padding: 7px 10px 7px 34px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-strong);
  background: var(--bg); font-size: 13px;
}
.task-filter-bar select {
  padding: 7px 10px; border-radius: var(--radius-md);
  border: 1px solid var(--border-strong);
  background: var(--bg); font-size: 13px;
}

.task-table-scroll {
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: thin; scrollbar-color: var(--border-strong) transparent;
}
.task-table-scroll::-webkit-scrollbar { height: 8px; }
.task-table-scroll::-webkit-scrollbar-track { background: transparent; }
.task-table-scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: var(--radius-full); }

.task-table {
  width: 100%; min-width: 1000px;
  border-collapse: collapse; font-size: 14px;
}
.task-table th, .task-table td {
  padding: 10px 14px; text-align: left;
  border-bottom: 1px solid var(--border);
  vertical-align: middle; white-space: nowrap;
}
.task-table th {
  font-size: 11px; font-weight: 600;
  color: var(--fg-muted);
  text-transform: uppercase; letter-spacing: 0.05em;
  background: var(--bg-subtle);
  position: sticky; top: 0; z-index: 1;
}
.task-table th[style*="cursor:pointer"]:hover { color: var(--fg); background: var(--hover); }
.task-table th .material-symbols-rounded { font-size: 14px; opacity: 0.6; }
.task-table th[style*="cursor:pointer"]:hover .material-symbols-rounded { opacity: 1; }
/* Aktive Sortierung: voll dunkel */
.task-table th.sort-active { color: var(--fg) !important; }
.task-table th.sort-active .material-symbols-rounded { opacity: 1 !important; }
.task-table th.col-dragging { opacity: 0.3; }
.task-table th.col-drop-target { 
  background: var(--accent) !important; 
  color: var(--accent-fg) !important; 
  box-shadow: inset -2px 0 0 var(--accent-fg);
}
.task-table th.col-drop-target .material-symbols-rounded { color: var(--accent-fg); opacity: 1 !important; }
.task-table tr { transition: background 0.15s ease; }
.task-table tbody tr:hover { background: var(--hover); cursor: pointer; }
.task-table tr.done { opacity: 0.5; }
.task-table tr.done .task-title { text-decoration: line-through; }

.task-title-cell { white-space: normal; min-width: 240px; max-width: 380px; }
.task-title { font-weight: 500; line-height: 1.3; }
.task-title-sub {
  font-size: 12px; color: var(--fg-muted);
  margin-top: 2px; display: flex; align-items: center; gap: 4px;
}
.task-checkbox {
  width: 22px; height: 22px; border-radius: 6px;
  border: 2px solid var(--border-strong);
  background: var(--bg-elev);
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s ease; flex-shrink: 0;
}
.task-checkbox:hover { border-color: var(--accent); }
.task-checkbox.checked { background: var(--sys-success); border-color: var(--sys-success); color: white; }
.task-checkbox .material-symbols-rounded { font-size: 16px; }

/* Status pills WITH BACKGROUNDS */
.status-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 11px; border-radius: var(--radius-full);
  font-size: 12px; font-weight: 500;
  border: 1px solid; white-space: nowrap;
}
.status-pill::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.status-Offen     { color: var(--sys-info);     background: var(--sys-info-bg);     border-color: var(--sys-info-border); }
.status-Arbeit    { color: var(--sys-progress); background: var(--sys-progress-bg); border-color: var(--sys-progress-border); }
.status-Wartet    { color: var(--sys-warn);     background: var(--sys-warn-bg);     border-color: var(--sys-warn-border); }
.status-Blockiert { color: var(--sys-error);    background: var(--sys-error-bg);    border-color: var(--sys-error-border); }
.status-Erledigt  { color: var(--sys-success);  background: var(--sys-success-bg);  border-color: var(--sys-success-border); }

.floor-tags { display: flex; flex-wrap: wrap; gap: 3px; }
.floor-tag {
  padding: 2px 8px; background: var(--hover);
  border-radius: 5px; font-size: 11px; font-weight: 600;
  font-variant-numeric: tabular-nums; letter-spacing: 0.02em;
}

.contact-pill {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 3px 10px 3px 3px;
  border-radius: var(--radius-full);
  background: var(--hover);
  font-size: 12px; font-weight: 500; white-space: nowrap;
}
.contact-pill .avatar {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--accent); color: var(--accent-fg);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 600;
}

/* Kanban */
.kanban {
  display: grid; grid-template-columns: repeat(5, minmax(260px, 1fr));
  gap: 16px; overflow-x: auto; padding-bottom: 8px;
  -webkit-overflow-scrolling: touch;
}
@media (max-width: 1100px) { .kanban { grid-template-columns: repeat(5, 280px); } }
.kanban-col {
  background: var(--bg-elev); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 14px; min-height: 240px;
}
.kanban-col-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; padding: 0 4px; }
.kanban-col-head h3 { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 7px; text-transform: uppercase; letter-spacing: 0.05em; }
.kanban-col-count { font-size: 12px; color: var(--fg-muted); background: var(--hover); padding: 2px 9px; border-radius: var(--radius-full); font-weight: 500; }
.kanban-card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 12px;
  margin-bottom: 8px; cursor: grab;
  transition: all 0.15s ease;
  user-select: none;
}
.kanban-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); border-color: var(--border-strong); }
.kanban-card:active { cursor: grabbing; }
.kanban-card.dragging { opacity: 0.4; transform: rotate(2deg); }
.kanban-col.drag-over {
  background: var(--hover);
  border-color: var(--accent);
  border-style: dashed;
}
.kanban-col-body { min-height: 60px; }
.kanban-card-meta { display: flex; flex-wrap: wrap; gap: 5px; font-size: 11px; margin-bottom: 6px; }
.kanban-card-title { font-size: 13px; font-weight: 500; margin-bottom: 8px; line-height: 1.35; }
.kanban-card-foot { display: flex; flex-wrap: wrap; gap: 5px; }

/* Contacts */
.contacts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}
.contact-card {
  background: var(--bg-elev); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 18px;
  cursor: pointer; transition: all 0.2s ease;
  display: flex; flex-direction: column; gap: 10px;
}
.contact-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--accent); }
.contact-card-head { display: flex; gap: 12px; align-items: flex-start; }
.contact-card-avatar {
  width: 46px; height: 46px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 600;
  color: var(--accent-fg); flex-shrink: 0;
}
.contact-card-info { flex: 1; min-width: 0; }
.contact-card-name { font-weight: 600; font-size: 15px; line-height: 1.3; }
.contact-card-company { font-size: 13px; color: var(--fg-muted); margin-top: 2px; }
.contact-card-trade {
  display: inline-flex; padding: 3px 9px; margin-top: 6px;
  background: var(--sys-info-bg); color: var(--sys-info);
  border: 1px solid var(--sys-info-border);
  border-radius: var(--radius-full);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.02em;
}
.contact-card-actions { display: flex; gap: 4px; }
.contact-card-actions a {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 8px; border-radius: var(--radius-md);
  border: 1px solid var(--border);
  transition: all 0.15s ease; color: var(--fg-muted);
}
.contact-card-actions a:hover { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
.contact-card-actions a.disabled { opacity: 0.3; pointer-events: none; }
.contact-stats {
  display: flex; justify-content: space-between;
  font-size: 12px; color: var(--fg-muted);
  padding-top: 10px; border-top: 1px solid var(--border);
}
.contact-stats strong { color: var(--fg); font-weight: 600; }

/* Detail meta */
.task-detail-meta {
  display: grid; gap: 10px;
  grid-template-columns: 130px 1fr;
  margin-bottom: 20px; font-size: 14px;
}
.task-detail-meta dt { color: var(--fg-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; align-self: center; }
.task-detail-meta dd { font-weight: 500; }

.comments { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
.comments h3 { font-size: 13px; font-weight: 600; color: var(--fg-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 6px; }
.comment { display: flex; gap: 10px; padding: 10px 0; }
.comment-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--oda-blue-light); color: var(--accent-fg); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
.comment-body { flex: 1; }
.comment-meta { font-size: 12px; color: var(--fg-muted); }
.comment-text { font-size: 14px; margin-top: 2px; white-space: pre-wrap; }
.comment-form { display: flex; gap: 8px; margin-top: 12px; }
.comment-form input { flex: 1; padding: 9px 12px; border-radius: var(--radius-md); border: 1px solid var(--border-strong); background: var(--bg); }

/* Trade Stat Cards (Übersicht aller Gewerke) */
.trade-stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}
.trade-stat-card {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-left-width: 3px;
  border-radius: var(--radius-lg);
  padding: 18px;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex; flex-direction: column;
  gap: 12px;
}
.trade-stat-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.trade-stat-head {
  display: flex; justify-content: space-between; align-items: baseline;
}
.trade-stat-name {
  font-size: 16px; font-weight: 600; letter-spacing: -0.01em;
}
.trade-stat-pct {
  font-size: 22px; font-weight: 600; color: var(--fg);
  font-variant-numeric: tabular-nums;
}
.trade-stat-grid-inner {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
  gap: 8px;
}
.trade-stat-cell {
  text-align: center; padding: 8px 4px;
  background: var(--bg-subtle); border-radius: var(--radius-md);
}
.trade-stat-cell-value {
  font-size: 20px; font-weight: 600;
  font-variant-numeric: tabular-nums; line-height: 1.1;
}
.trade-stat-cell-label {
  font-size: 10px; color: var(--fg-muted);
  margin-top: 4px; text-transform: uppercase; letter-spacing: 0.04em;
}
.trade-stat-hours {
  padding: 10px 12px; background: var(--bg-subtle);
  border-radius: var(--radius-md);
  display: flex; flex-direction: column; gap: 4px;
}
.trade-stat-hours-row {
  display: flex; justify-content: space-between; align-items: center;
  font-variant-numeric: tabular-nums; font-size: 13px;
}
.trade-stat-foot {
  font-size: 12px; color: var(--fg-muted);
  padding-top: 8px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 4px;
}
.trade-stat-foot .material-symbols-rounded { font-size: 14px; }

.trade-detail-hero { margin-bottom: 24px; }

/* Pill tabs */
.pill-tabs { display: flex; gap: 6px; margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; padding-bottom: 4px; }
.pill-tabs::-webkit-scrollbar { display: none; }
.pill-tab { padding: 8px 16px; border-radius: var(--radius-full); background: var(--bg-elev); border: 1px solid var(--border); font-size: 13px; font-weight: 500; white-space: nowrap; transition: all 0.2s ease; }
.pill-tab:hover { border-color: var(--border-strong); }
.pill-tab.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }

.area-group { background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 16px; overflow: hidden; }
.area-group-head { padding: 14px 18px; background: var(--bg-subtle); font-weight: 600; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
.area-group-head .area-name { display: flex; align-items: center; gap: 8px; }
.area-group-count { color: var(--fg-muted); font-weight: 500; font-size: 12px; padding: 2px 9px; background: var(--bg-elev); border-radius: var(--radius-full); }

/* Timeline */
.timeline { background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; overflow-x: auto; }
.timeline-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); min-width: 800px; }
.timeline-row:last-child { border-bottom: none; }
.timeline-task { width: 320px; font-size: 13px; font-weight: 500; flex-shrink: 0; }
.timeline-task small { display: block; color: var(--fg-muted); font-weight: 400; margin-top: 2px; }
.timeline-bar-track { flex: 1; height: 26px; background: var(--bg-subtle); border-radius: 5px; position: relative; }
.timeline-bar { position: absolute; top: 4px; bottom: 4px; background: var(--accent); color: var(--accent-fg); border-radius: 4px; padding: 0 8px; font-size: 11px; display: flex; align-items: center; min-width: 40px; font-weight: 500; }
.timeline-bar.done { background: var(--sys-success); }
.timeline-bar.blocked { background: var(--sys-error); }

.empty-state { padding: 60px 20px; text-align: center; color: var(--fg-muted); }
.empty-state .material-symbols-rounded { font-size: 48px; opacity: 0.4; margin-bottom: 12px; }
.empty-state h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--fg); }

.loading { display: flex; align-items: center; justify-content: center; padding: 80px 20px; color: var(--fg-muted); }
.spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 10px; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--fg); color: var(--bg); padding: 11px 20px; border-radius: var(--radius-md); font-size: 14px; font-weight: 500; box-shadow: var(--shadow-lg); z-index: 200; animation: toastIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); display: flex; align-items: center; gap: 8px; }
@keyframes toastIn { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }

.fab { position: fixed; right: 24px; bottom: 24px; width: 56px; height: 56px; border-radius: 50%; background: var(--accent); color: var(--accent-fg); box-shadow: var(--shadow-lg); display: flex; align-items: center; justify-content: center; transition: transform 0.2s ease; z-index: 40; }
.fab:hover { transform: scale(1.05); }
.fab:active { transform: scale(0.95); }
.fab .material-symbols-rounded { font-size: 28px; }

.flex { display: flex; }
.gap-2 { gap: 8px; }
.mb-2 { margin-bottom: 8px; }
.mt-2 { margin-top: 8px; }
.text-sm { font-size: 13px; }
.text-muted { color: var(--fg-muted); }
.hidden { display: none !important; }
</style>
</head>
<body>
<div id="app" class="app">
  <header class="topbar">
    <div class="topbar-brand">
      <span class="brand-mark">ODA</span>
      <small>Bauprojekt Weinmarkt · Luzern</small>
    </div>
    <div class="topbar-spacer"></div>
    <div class="topbar-actions">
      <span id="countdown-badge" class="badge"></span>
      <button id="login-btn" class="login-pill" title="Login / Benutzer wechseln">
        <span class="login-pill-avatar" id="login-avatar">?</span>
        <span id="login-label">Login</span>
        <span class="material-symbols-rounded">swap_horiz</span>
      </button>
      <button id="theme-btn" class="btn icon-only" title="Theme wechseln">
        <span class="material-symbols-rounded">dark_mode</span>
      </button>

  <button id="theme-fab" class="theme-fab" title="Theme wechseln">
    <span class="material-symbols-rounded">dark_mode</span>
  </button>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-view="dashboard"><span class="material-symbols-rounded">dashboard</span>Dashboard</button>
    <button class="tab" data-view="tasks"><span class="material-symbols-rounded">checklist</span>Aufgaben</button>

    <button class="tab" data-view="floors"><span class="material-symbols-rounded">apartment</span>Stockwerke</button>

    <button class="tab" data-view="timeline"><span class="material-symbols-rounded">timeline</span>Timeline</button>
    <button class="tab" data-view="activity"><span class="material-symbols-rounded">history</span>Aktivität</button>
  </nav>

  <main class="main" id="main">
    <div class="loading"><div class="spinner"></div> Lädt …</div>
  </main>
</div>

<datalist id="trades-list"></datalist>
<datalist id="companies-list"></datalist>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = 'https://nlrhutqupliplvjmjarg.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3GHgkXj-I4VBQB1Lk90GjQ_qFWF9Ict';
const ADMIN_CODE = 'oda2026';
const FLOORS = ['UG','EG','OG1','OG2','OG3','DG','Balkon','Treppenhaus'];
const STATUS_LIST = ['Offen','In Arbeit','Wartet','Blockiert','Erledigt'];

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const state = {
  tasks: [], contacts: [], comments: [], settings: {}, activity: [],
  currentView: 'dashboard',
  currentFloor: 'all',
  currentTrade: null,
  contactDetail: null,
  isAdmin: false,
  activeUser: null,
  activeUserId: null,
  taskFilter: { q: '', status: '', floor: '', responsible: '' },
  taskSort: { col: null, dir: 'asc' },
  columnOrder: null,
  contactQuery: '',
  contactSort: 'trade',
};

// localStorage Persistence
function saveState() {
  try {
    localStorage.setItem('oda-task-filter', JSON.stringify(state.taskFilter));
    localStorage.setItem('oda-task-sort', JSON.stringify(state.taskSort));
    localStorage.setItem('oda-contact-sort', state.contactSort);
    localStorage.setItem('oda-current-view', state.currentView);
    localStorage.setItem('oda-current-floor', state.currentFloor);
    if (state.columnOrder) localStorage.setItem('oda-column-order', JSON.stringify(state.columnOrder));
  } catch(e) {}
}
function loadState() {
  try {
    const f = JSON.parse(localStorage.getItem('oda-task-filter') || 'null');
    if (f) Object.assign(state.taskFilter, f);
    const s = JSON.parse(localStorage.getItem('oda-task-sort') || 'null');
    if (s) Object.assign(state.taskSort, s);
    const cs = localStorage.getItem('oda-contact-sort');
    if (cs) state.contactSort = cs;
    const cv = localStorage.getItem('oda-current-view');
    if (cv) state.currentView = cv;
    const cf = localStorage.getItem('oda-current-floor');
    if (cf) state.currentFloor = cf;
    const co = JSON.parse(localStorage.getItem('oda-column-order') || 'null');
    if (co && Array.isArray(co)) state.columnOrder = co;
  } catch(e) {}
}

const $ = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => Array.from(r.querySelectorAll(s));
const icon = (n, c='') => { const s = document.createElement('span'); s.className = 'material-symbols-rounded' + (c ? ' '+c : ''); s.textContent = n; return s; };
const el = (tag, attrs={}, ...kids) => {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'data') Object.entries(v).forEach(([dk,dv]) => e.dataset[dk] = dv);
    else if (v !== undefined && v !== null && v !== false) e.setAttribute(k, v);
  }
  kids.flat().forEach(k => {
    if (k == null || k === false) return;
    if (typeof k === 'string' || typeof k === 'number') e.appendChild(document.createTextNode(k));
    else e.appendChild(k);
  });
  return e;
};
const escape = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]);
const initials = (a, b) => {
  const src = (a || b || '?').toString();
  return src.split(/\s|\/|&/).filter(Boolean).map(s => s[0]||'').slice(0,2).join('').toUpperCase();
};
function colorFromName(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  const palette = ['#1a1a1a','#3d2216','#606f5a','#4a585e','#86929b','#280704'];
  return palette[Math.abs(hash) % palette.length];
}
const statusClass = s => 'status-' + (s === 'In Arbeit' ? 'Arbeit' : s);
const fmtDate = d => !d ? '—' : new Date(d).toLocaleDateString('de-CH', { day:'2-digit', month:'2-digit', year:'numeric' });
const fmtDateShort = d => !d ? '—' : new Date(d).toLocaleDateString('de-CH', { day:'2-digit', month:'2-digit' });
const daysUntil = d => !d ? null : Math.ceil((new Date(d).getTime() - Date.now()) / 86400000);

function contactDisplay(c) {
  if (!c) return '—';
  if (c.name && c.company) return c.name + ' · ' + c.company;
  if (c.company) return c.company;
  if (c.name) return c.name;
  return c.trade || '—';
}
function contactPrimary(c) { return c.name || c.company || c.trade || '—'; }
function contactSecondary(c) {
  if (c.name && c.company) return c.company;
  if (c.name) return c.trade;
  return c.trade !== c.company ? c.trade : null;
}

function toast(msg, ic='check_circle') {
  const t = el('div', { class: 'toast' }, icon(ic, 'sm'), msg);
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%,20px)'; }, 2200);
  setTimeout(() => t.remove(), 2700);
}

async function loadAll() {
  const [tR, cR, coR, sR, aR] = await Promise.all([
    sb.from('tasks').select('*').order('code'),
    sb.from('contacts').select('*'),
    sb.from('comments').select('*').order('created_at', { ascending: false }),
    sb.from('settings').select('*'),
    sb.from('activity_log').select('*').order('created_at', { ascending: false }).limit(100),
  ]);
  state.tasks = tR.data || [];
  state.contacts = cR.data || [];
  state.contacts.sort((a,b) => {
    const at = (a.trade || 'zzz').localeCompare(b.trade || 'zzz', 'de');
    if (at !== 0) return at;
    return (contactPrimary(a)).localeCompare(contactPrimary(b), 'de');
  });
  state.comments = coR.data || [];
  state.activity = aR.data || [];
  state.settings = Object.fromEntries((sR.data || []).map(s => [s.key, s.value]));

  // Datalists für Autocomplete
  const tradesDL = $('#trades-list');
  const companiesDL = $('#companies-list');
  tradesDL.innerHTML = '';
  companiesDL.innerHTML = '';
  const trades = [...new Set(state.contacts.map(c => c.trade).filter(Boolean))].sort((a,b) => a.localeCompare(b,'de'));
  const companies = [...new Set(state.contacts.map(c => c.company).filter(Boolean))].sort((a,b) => a.localeCompare(b,'de'));
  trades.forEach(t => tradesDL.appendChild(el('option', { value: t })));
  companies.forEach(c => companiesDL.appendChild(el('option', { value: c })));
}

const contactById = id => state.contacts.find(c => c.id === id);
const subContactIds = t => (t.sub_responsible_ids && t.sub_responsible_ids.length)
  ? t.sub_responsible_ids
  : (t.sub_responsible_id ? [t.sub_responsible_id] : []);
const subContacts = t => subContactIds(t).map(contactById).filter(Boolean);
const tasksForContact = cid => state.tasks.filter(t => t.responsible_id === cid || subContactIds(t).includes(cid));
const tasksOnFloor = f => state.tasks.filter(t => (t.floors||[]).includes(f));
const dependencies = task => task.depends_on_codes || [];

function isTaskBlocked(task) {
  const deps = dependencies(task);
  if (!deps.length) return false;
  return deps.some(code => {
    const pred = state.tasks.find(t => t.code === code);
    return pred && pred.status !== 'Erledigt';
  });
}

function computeProjectEnd() {
  if (state.settings.opening_date) return new Date(state.settings.opening_date);
  const dates = state.tasks
    .filter(t => t.planned_end && t.status !== 'Erledigt')
    .map(t => new Date(t.planned_end).getTime());
  if (!dates.length) return null;
  return new Date(Math.max(...dates));
}

function firstName(displayName) {
  if (!displayName) return '';
  // strip "(Trade)" suffix
  let s = displayName.replace(/\s*\(.*?\)\s*$/, '').trim();
  // take first word (first name)
  return s.split(/\s+/)[0] || s;
}

function updateHeader() {
  const end = computeProjectEnd();
  const badge = $('#countdown-badge');
  const isMobile = window.matchMedia('(max-width: 768px)').matches;
  badge.innerHTML = '';
  if (!end) {
    badge.appendChild(icon(isMobile ? 'event_busy' : 'event_busy', 'sm'));
    if (!isMobile) badge.appendChild(document.createTextNode(' Kein Zieldatum'));
    badge.className = 'badge';
  } else {
    const days = daysUntil(end);
    badge.appendChild(icon(days < 0 ? 'priority_high' : 'event', 'sm'));
    if (isMobile) {
      // Kompakt: "39T" oder "-3T"
      badge.appendChild(document.createTextNode(' ' + (days >= 0 ? days + 'T' : days + 'T')));
    } else {
      badge.appendChild(document.createTextNode(days >= 0 ? ` Noch ${days} Tage` : ` ${Math.abs(days)} Tage überfällig`));
    }
    badge.className = 'badge ' + (days < 7 ? 'danger' : days < 30 ? 'warn' : 'ok');
  }
  
  // Login Pill: Avatar + Vorname + Swap-Icon
  const loginLabel = $('#login-label');
  const loginAvatar = $('#login-avatar');
  if (state.activeUserId) {
    const me = contactById(state.activeUserId);
    const display = me ? contactPrimary(me) : state.activeUser;
    loginLabel.textContent = firstName(display);
    loginAvatar.textContent = me ? initials(me.name, me.company) : '?';
    if (me) loginAvatar.style.background = me.color || colorFromName(contactPrimary(me));
  } else {
    loginLabel.textContent = 'Login';
    loginAvatar.textContent = '?';
    loginAvatar.style.background = '';
  }
  
  // Theme-Icons synchronisieren (Desktop + Mobile)
  const isDark = document.documentElement.classList.contains('dark');
  const themeIcon = isDark ? 'light_mode' : 'dark_mode';
  const themeBtn = $('#theme-btn .material-symbols-rounded');
  if (themeBtn) themeBtn.textContent = themeIcon;
  const themeFab = $('#theme-fab .material-symbols-rounded');
  if (themeFab) themeFab.textContent = themeIcon;
  
  // Admin-Body-Klasse
  document.body.classList.toggle('is-admin', !!state.isAdmin);

// ===== TASK TABLE =====
const SORT_KEYS = {
  'title': t => (t.title || '').toLowerCase(),
  'floors': t => (t.floors || []).join(','),
  'area': t => (t.area || '').toLowerCase(),
  'trade': t => {
    const subs = subContacts(t);
    return subs.length ? subs.map(s => s.trade || '').join(',') : (contactById(t.responsible_id)?.trade || '');
  },
  'responsible': t => contactPrimary(contactById(t.responsible_id) || {}).toLowerCase(),
  'effort': t => t.effort_hours || 0,
  'planned_end': t => t.planned_end ? new Date(t.planned_end).getTime() : Infinity,
  'status': t => t.status || '',
};

// Spalten-Definition mit Render-Funktion pro Zelle
const COLUMN_DEFS = {
  checkbox:    { label: '', sortable: false, headStyle: 'width:46px', fixed: true },
  title:       { label: 'Aufgabe', sortable: true, sortKey: 'title' },
  floors:      { label: 'Stockwerk', sortable: true, sortKey: 'floors' },
  area:        { label: 'Bereich', sortable: true, sortKey: 'area' },
  trade:       { label: 'Gewerk', sortable: true, sortKey: 'trade' },
  responsible: { label: 'Verantwortlich', sortable: true, sortKey: 'responsible' },
  effort:      { label: 'Aufwand', sortable: true, sortKey: 'effort' },
  planned_end: { label: 'Frist', sortable: true, sortKey: 'planned_end' },
  status:      { label: 'Status', sortable: true, sortKey: 'status' },
};

const DEFAULT_COLUMN_ORDER = ['checkbox','title','floors','area','trade','responsible','effort','planned_end','status'];

function getColumnOrder() {
  const order = state.columnOrder && state.columnOrder.length ? state.columnOrder : DEFAULT_COLUMN_ORDER;
  // ensure checkbox always first, ensure all default columns present
  const filtered = order.filter(k => COLUMN_DEFS[k] && k !== 'checkbox');
  DEFAULT_COLUMN_ORDER.filter(k => k !== 'checkbox').forEach(k => {
    if (!filtered.includes(k)) filtered.push(k);
  });
  return ['checkbox', ...filtered];
}

function reorderColumn(fromKey, toKey) {
  if (fromKey === 'checkbox' || toKey === 'checkbox') return; // checkbox is fixed
  const order = getColumnOrder().slice();
  const fromIdx = order.indexOf(fromKey);
  const toIdx = order.indexOf(toKey);
  if (fromIdx < 0 || toIdx < 0 || fromIdx === toIdx) return;
  order.splice(fromIdx, 1);
  order.splice(toIdx, 0, fromKey);
  state.columnOrder = order;
  try { localStorage.setItem('oda-column-order', JSON.stringify(order)); } catch(e){}
  render();
}

function sortTasks(tasks) {
  const { col, dir } = state.taskSort;
  if (!col || !SORT_KEYS[col]) return tasks;
  const fn = SORT_KEYS[col];
  return tasks.slice().sort((a, b) => {
    const av = fn(a), bv = fn(b);
    let cmp;
    if (typeof av === 'string' && typeof bv === 'string') cmp = av.localeCompare(bv, 'de');
    else cmp = av < bv ? -1 : av > bv ? 1 : 0;
    return dir === 'asc' ? cmp : -cmp;
  });
}

function toggleSort(col) {
  if (state.taskSort.col === col) {
    if (state.taskSort.dir === 'asc') state.taskSort.dir = 'desc';
    else { state.taskSort.col = null; state.taskSort.dir = 'asc'; }
  } else {
    state.taskSort.col = col;
    state.taskSort.dir = 'asc';
  }
  saveState();
  render();
}

function sortIcon(col) {
  if (state.taskSort.col !== col) return icon('unfold_more', 'sm');
  return icon(state.taskSort.dir === 'asc' ? 'arrow_upward' : 'arrow_downward', 'sm');
}

function buildHeaderTh(key) {
  const def = COLUMN_DEFS[key];
  if (!def) return null;
  
  if (def.fixed) {
    return el('th', { style: def.headStyle || '', 'data-col': key }, def.label);
  }
  
  const isActive = def.sortable && state.taskSort.col === def.sortKey;
  const th = el('th', {
    style: 'cursor:pointer; user-select:none' + (def.headStyle ? '; ' + def.headStyle : ''),
    class: isActive ? 'sort-active' : '',
    'data-col': key,
    draggable: true,
    onClick: () => def.sortable && toggleSort(def.sortKey),
    onDragstart: (e) => {
      e.dataTransfer.setData('text/col', key);
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => th.classList.add('col-dragging'), 0);
    },
    onDragend: () => {
      th.classList.remove('col-dragging');
      $$('.col-drop-target').forEach(t => t.classList.remove('col-drop-target'));
    },
    onDragover: (e) => {
      const colKey = e.dataTransfer.types.includes('text/col');
      if (!colKey) return;
      e.preventDefault();
      th.classList.add('col-drop-target');
    },
    onDragleave: () => th.classList.remove('col-drop-target'),
    onDrop: (e) => {
      e.preventDefault();
      th.classList.remove('col-drop-target');
      const draggedKey = e.dataTransfer.getData('text/col');
      if (draggedKey) reorderColumn(draggedKey, key);
    },
    title: def.sortable ? 'Klicken zum Sortieren · Ziehen zum Verschieben' : 'Ziehen zum Verschieben'
  },
    el('span', { style: 'display:inline-flex; align-items:center; gap:4px' },
      def.label,
      def.sortable ? sortIcon(def.sortKey) : null
    )
  );
  return th;
}

// Cells für eine Aufgabe – als Map, damit wir je nach Spalten-Reihenfolge anordnen
function buildCellMap(t) {
  const resp = contactById(t.responsible_id);
  const subs = subContacts(t);
  const tradeNames = [...new Set(subs.map(s => s.trade).filter(Boolean))];
  const personContact = resp;
  const isDone = t.status === 'Erledigt';
  const blocked = isTaskBlocked(t) && !isDone;
  const effective = blocked ? 'Blockiert' : t.status;
  const deps = dependencies(t);

  return {
    checkbox: el('td', { onClick: (e) => { e.stopPropagation(); toggleTaskDone(t); }},
      el('div', { class: 'task-checkbox' + (isDone ? ' checked' : '') },
        isDone ? icon('check', 'sm') : null
      )
    ),
    title: el('td', { class: 'task-title-cell' },
      el('div', { class: 'task-title' }, t.title),
      deps.length ? el('div', { class: 'task-title-sub' }, icon('arrow_back', 'sm'),
        'Abhängig von ' + deps.map(c => '#' + c).join(', ')) : null
    ),
    floors: el('td', {}, el('div', { class: 'floor-tags' }, ...(t.floors||[]).map(f => el('span', { class: 'floor-tag' }, f)))),
    area: el('td', {}, t.area || '—'),
    trade: el('td', {}, tradeNames.length
      ? el('div', { class: 'floor-tags' }, ...tradeNames.map(tr => el('span', { class: 'floor-tag' }, tr)))
      : '—'),
    responsible: el('td', {}, personContact ? buildContactPill(personContact) : (subs[0] ? buildContactPill(subs[0]) : '—')),
    effort: el('td', {}, t.effort_hours ? t.effort_hours + ' h' : '—'),
    planned_end: el('td', {}, fmtDate(t.planned_end)),
    status: el('td', {}, el('span', { class: 'status-pill ' + statusClass(effective) }, effective))
  };
}

function buildTaskRow(t) {
  const isDone = t.status === 'Erledigt';
  const cells = buildCellMap(t);
  const tr = el('tr', { class: isDone ? 'done' : '', onClick: () => openTaskDetail(t.id) });
  getColumnOrder().forEach(key => {
    if (cells[key]) tr.appendChild(cells[key]);
  });
  return tr;
}

function buildTaskTable(tasks) {
  const tbl = el('table', { class: 'task-table' });
  const headerRow = el('tr', {});
  getColumnOrder().forEach(key => {
    const th = buildHeaderTh(key);
    if (th) headerRow.appendChild(th);
  });
  tbl.appendChild(el('thead', {}, headerRow));
  const tb = el('tbody');
  tasks.forEach(t => tb.appendChild(buildTaskRow(t)));
  tbl.appendChild(tb);
  return tbl;
}

function buildContactPill(c) {
  const label = contactPrimary(c);
  const color = c.color || colorFromName(label);
  return el('span', { class: 'contact-pill' },
    el('span', { class: 'avatar', style: `background:${color}` }, initials(c.name, c.company)),
    label
  );
}

// ===== TASKS VIEW =====
function renderTasks() {
  const main = $('#main');
  main.innerHTML = '';

  const hasActiveFilter = state.taskFilter.q || state.taskFilter.status || state.taskFilter.floor || state.taskFilter.responsible;

  const wrap = el('div', { class: 'task-table-wrap' });
  const fb = el('div', { class: 'task-filter-bar' },
    el('div', { class: 'search-input' },
      icon('search', 'sm'),
      el('input', { type: 'search', placeholder: 'Aufgabe oder Bereich suchen…', value: state.taskFilter.q,
        onInput: (e) => { state.taskFilter.q = e.target.value; saveState(); refreshTaskTable(); } })
    ),
    el('select', { onChange: (e) => { state.taskFilter.status = e.target.value; saveState(); refreshTaskTable(); } },
      el('option', { value: '' }, 'Alle Stati'),
      ...STATUS_LIST.map(s => el('option', { value: s, selected: state.taskFilter.status === s }, s))
    ),
    el('select', { onChange: (e) => { state.taskFilter.floor = e.target.value; saveState(); refreshTaskTable(); } },
      el('option', { value: '' }, 'Alle Stockwerke'),
      ...FLOORS.map(f => el('option', { value: f, selected: state.taskFilter.floor === f }, f))
    ),
    el('select', { onChange: (e) => { state.taskFilter.responsible = e.target.value; saveState(); refreshTaskTable(); } },
      el('option', { value: '' }, 'Alle Verantwortlichen'),
      ...state.contacts.map(c => el('option', { value: c.id, selected: state.taskFilter.responsible === c.id },
        contactPrimary(c) + (c.trade ? ' (' + c.trade + ')' : '')))
    ),
    hasActiveFilter ? el('button', { class: 'btn small', onClick: () => {
      state.taskFilter = { q: '', status: '', floor: '', responsible: '' };
      saveState();
      render();
    }}, icon('filter_alt_off', 'sm'), 'Filter zurücksetzen') : null,
    el('button', { class: 'btn small', onClick: exportCSV }, icon('download', 'sm'), 'CSV')
  );
  wrap.appendChild(fb);
  wrap.appendChild(el('div', { class: 'task-table-scroll', id: 'task-scroll' }));
  main.appendChild(wrap);
  refreshTaskTable();
}

function filteredTasks() {
  const f = state.taskFilter;
  return state.tasks.filter(t => {
    if (f.q) {
      const q = f.q.toLowerCase();
      if (!t.title.toLowerCase().includes(q) && !(t.area||'').toLowerCase().includes(q)) return false;
    }
    if (f.status) {
      if (f.status === 'Blockiert') {
        const isBlocked = t.status === 'Blockiert' || (isTaskBlocked(t) && t.status !== 'Erledigt');
        if (!isBlocked) return false;
      } else {
        if (t.status !== f.status) return false;
      }
    }
    if (f.floor && !(t.floors||[]).includes(f.floor)) return false;
    if (f.responsible && t.responsible_id !== f.responsible && !subContactIds(t).includes(f.responsible)) return false;
    return true;
  });
}

function refreshTaskTable() {
  const scroll = $('#task-scroll');
  if (!scroll) return;
  scroll.innerHTML = '';
  const tasks = sortTasks(filteredTasks());
  scroll.appendChild(buildTaskTable(tasks));
  if (!tasks.length) scroll.appendChild(el('div', { class: 'empty-state' }, icon('inbox', 'xl'), el('h3', {}, 'Keine Aufgaben')));
}

// ===== BOARD (Kanban mit Drag & Drop) =====
function renderKanban() {
  const main = $('#main');
  main.innerHTML = '';
  const wrap = el('div', { class: 'kanban' });
  const statusIcons = { 'Offen': 'radio_button_unchecked', 'In Arbeit': 'sync', 'Wartet': 'hourglass_top', 'Blockiert': 'block', 'Erledigt': 'check_circle' };
  STATUS_LIST.forEach(status => {
    const tasks = state.tasks.filter(t => {
      if (status === 'Blockiert') return t.status === 'Blockiert' || (isTaskBlocked(t) && t.status !== 'Erledigt' && t.status !== 'Blockiert');
      if (status === 'Offen') return t.status === 'Offen' && !isTaskBlocked(t);
      return t.status === status;
    });
    const colBody = el('div', { class: 'kanban-col-body' }, ...tasks.map(t => buildKanbanCard(t)));
    const col = el('div', { 
      class: 'kanban-col', 
      'data-status': status,
      onDragover: (e) => { e.preventDefault(); col.classList.add('drag-over'); },
      onDragleave: (e) => { 
        // Nur entfernen wenn wir wirklich raus aus der col sind
        if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over');
      },
      onDrop: async (e) => {
        e.preventDefault();
        col.classList.remove('drag-over');
        const taskId = e.dataTransfer.getData('text/task-id');
        const t = state.tasks.find(x => x.id === taskId);
        if (!t) return;
        // Bei Blockiert (implizit) → nicht ändern wenn schon implizit blockiert
        let newStatus = status;
        if (status === 'Blockiert' && isTaskBlocked(t)) {
          // ist eh schon implizit blockiert, nichts tun
          return;
        }
        if (t.status === newStatus) return;
        await updateTaskStatus(t.id, newStatus);
      }
    },
      el('div', { class: 'kanban-col-head' },
        el('h3', { class: statusClass(status) }, icon(statusIcons[status], 'sm'), status),
        el('span', { class: 'kanban-col-count' }, tasks.length)
      ),
      colBody
    );
    wrap.appendChild(col);
  });
  main.appendChild(wrap);
}

function buildKanbanCard(t) {
  const resp = contactById(t.responsible_id);
  const subs = subContacts(t);
  const tradeNames = [...new Set(subs.map(s => s.trade).filter(Boolean))];
  const card = el('div', {
    class: 'kanban-card',
    draggable: true,
    'data-task-id': t.id,
    onClick: () => openTaskDetail(t.id),
    onDragstart: (e) => {
      e.dataTransfer.setData('text/task-id', t.id);
      e.dataTransfer.effectAllowed = 'move';
      card.classList.add('dragging');
    },
    onDragend: () => {
      card.classList.remove('dragging');
      $$('.kanban-col.drag-over').forEach(c => c.classList.remove('drag-over'));
    }
  },
    el('div', { class: 'kanban-card-meta' },

// ===== TRADES =====
function renderTrades() {
  const main = $('#main');
  main.innerHTML = '';

  // Alle vorhandenen Gewerke sammeln – aus Kontakten UND aus Aufgaben
  const tradeSet = new Set();
  state.contacts.forEach(c => { if (c.trade) tradeSet.add(c.trade); });
  state.tasks.forEach(t => {
    subContacts(t).forEach(s => { if (s.trade) tradeSet.add(s.trade); });
  });
  const trades = [...tradeSet].sort((a,b) => a.localeCompare(b,'de'));

  // Per-Trade Statistiken
  const tradeStats = {};
  trades.forEach(tr => {
    const tradeContacts = state.contacts.filter(c => c.trade === tr);
    // Aufgaben: alle die diesen Trade haben (direkt via subs oder Verantwortlich-Trade)
    const tasksSet = new Map();
    state.tasks.forEach(t => {
      const subs = subContacts(t);
      const subTrades = subs.map(s => s.trade);
      const respTrade = contactById(t.responsible_id)?.trade;
      if (subTrades.includes(tr) || (respTrade === tr && !subs.length)) {
        tasksSet.set(t.id, t);
      }
    });
    const tasks = [...tasksSet.values()];
    const done = tasks.filter(t => t.status === 'Erledigt');
    const inProgress = tasks.filter(t => t.status === 'In Arbeit');
    const blocked = tasks.filter(t => t.status !== 'Erledigt' && (t.status === 'Blockiert' || isTaskBlocked(t)));
    const open = tasks.filter(t => t.status !== 'Erledigt');
    const totalH = tasks.reduce((s,t) => s + (Number(t.effort_hours) || 0), 0);
    const doneH = done.reduce((s,t) => s + (Number(t.effort_hours) || 0), 0);
    const openH = totalH - doneH;
    const pct = tasks.length ? Math.round((done.length / tasks.length) * 100) : 0;
    
    tradeStats[tr] = {
      contacts: tradeContacts,
      tasks, done, inProgress, blocked, open,
      totalH, doneH, openH, pct
    };
  });

  // Pill-Tabs zum schnellen Wechseln + "Übersicht" Button
  main.appendChild(el('div', { class: 'pill-tabs' },
    el('button', { class: 'pill-tab' + (!state.currentTrade ? ' active' : ''),
      onClick: () => { state.currentTrade = null; renderTrades(); } }, 'Übersicht'),
    ...trades.map(tr => {
      const s = tradeStats[tr];
      const isActive = state.currentTrade && contactById(state.currentTrade)?.trade === tr;
      return el('button', { 
        class: 'pill-tab' + (isActive ? ' active' : ''),
        onClick: () => { 
          // ersten Kontakt mit diesem Trade nehmen, oder pseudo
          const firstContact = s.contacts[0];
          if (firstContact) {
            state.currentTrade = firstContact.id;
          } else {
            state.currentTrade = '__trade__' + tr; // Fallback wenn kein Kontakt
          }
          renderTrades(); 
        } 
      }, `${tr} (${s.open.length})`);
    })
  ));

  // ===== ÜBERSICHT: alle Gewerke mit Statistiken =====
  if (!state.currentTrade) {
    const totalProject = state.tasks.reduce((s,t) => s + (Number(t.effort_hours)||0), 0);
    
    // Oben: Gesamtprojekt-Zusammenfassung
    main.appendChild(el('div', { class: 'section' },
      el('div', { class: 'section-head' }, el('h2', {}, icon('insights'), `Übersicht aller Gewerke (${trades.length})`))
    ));
    
    if (!trades.length) {
      main.appendChild(el('div', { class: 'empty-state' }, icon('construction', 'xl'),
        el('h3', {}, 'Noch keine Gewerke')));
      return;
    }
    
    // Sortiere Gewerke nach offenen Stunden (am meisten zuerst)
    const sortedTrades = trades.slice().sort((a,b) => tradeStats[b].openH - tradeStats[a].openH);
    
    const grid = el('div', { class: 'trade-stat-grid' });
    sortedTrades.forEach(tr => {
      const s = tradeStats[tr];
      grid.appendChild(buildTradeStatCard(tr, s));
    });
    main.appendChild(grid);
    return;
  }

  // ===== DETAIL: einzelnes Gewerk =====
  let activeTrade;
  if (state.currentTrade && state.currentTrade.startsWith('__trade__')) {
    activeTrade = state.currentTrade.substring(9);
  } else {
    const c = contactById(state.currentTrade);
    activeTrade = c?.trade;
  }
  if (!activeTrade) { state.currentTrade = null; renderTrades(); return; }
  
  const s = tradeStats[activeTrade];
  if (!s) { state.currentTrade = null; renderTrades(); return; }
  
  // Hero-Section mit Trade-Statistiken
  main.appendChild(el('div', { class: 'section' },
    el('div', { class: 'section-head' },
      el('h2', {}, icon('construction'), activeTrade),
      el('button', { class: 'btn small', onClick: () => { state.currentTrade = null; renderTrades(); } }, 
        icon('arrow_back', 'sm'), 'Zur Übersicht')
    ),
    buildTradeDetailHero(activeTrade, s)
  ));
  
  // Kontakte zu diesem Gewerk
  if (s.contacts.length) {
    main.appendChild(el('div', { class: 'section' },
      el('div', { class: 'section-head' }, el('h2', {}, icon('groups'), `Kontakte (${s.contacts.length})`)),
      el('div', { class: 'contacts-grid' }, ...s.contacts.map(c => buildContactCard(c)))
    ));
  }
  
  // Aufgaben
  if (s.tasks.length) {
    main.appendChild(el('div', { class: 'section' },
      el('div', { class: 'section-head' }, el('h2', {}, icon('checklist'), `Aufgaben (${s.tasks.length})`)),
      el('div', { class: 'task-table-wrap' }, 
        el('div', { class: 'task-table-scroll' }, buildTaskTable(sortTasks(s.tasks)))
      )
    ));
  }
}

// ===== CONTACTS =====
function renderContacts() {
  const main = $('#main');
  main.innerHTML = '';
  if (state.contactDetail) { renderContactDetail(state.contactDetail); return; }

  // Filter Bar
  const filterBar = el('div', { class: 'task-filter-bar', style: 'border-radius: var(--radius-lg); margin-bottom: 20px; border: 1px solid var(--border); background: var(--bg-elev)' },
    el('div', { class: 'search-input' },
      icon('search', 'sm'),
      el('input', { type: 'search', placeholder: 'Person, Firma oder Gewerk suchen…', value: state.contactQuery,
        onInput: (e) => { state.contactQuery = e.target.value; renderContacts(); } })
    ),
    el('select', { onChange: (e) => { state.contactSort = e.target.value; saveState(); renderContacts(); } },
      el('option', { value: 'trade', selected: state.contactSort === 'trade' }, 'Sortiert nach Gewerk'),
      el('option', { value: 'name', selected: state.contactSort === 'name' }, 'Sortiert nach Name'),
      el('option', { value: 'company', selected: state.contactSort === 'company' }, 'Sortiert nach Firma'),
      el('option', { value: 'tasks', selected: state.contactSort === 'tasks' }, 'Sortiert nach offenen Aufgaben')
    ),
    state.contactQuery ? el('button', { class: 'btn small', onClick: () => {
      state.contactQuery = '';
      renderContacts();
    }}, icon('filter_alt_off', 'sm'), 'Reset') : null
  );
  main.appendChild(filterBar);

  // Filter contacts by search query
  const q = state.contactQuery.trim().toLowerCase();
  let filtered = state.contacts;
  if (q) {
    filtered = filtered.filter(c => 
      (c.name && c.name.toLowerCase().includes(q)) ||
      (c.company && c.company.toLowerCase().includes(q)) ||
      (c.trade && c.trade.toLowerCase().includes(q)) ||
      (c.role && c.role.toLowerCase().includes(q))
    );
  }

  // Sortieren
  const collator = new Intl.Collator('de');
  if (state.contactSort === 'name') {
    filtered = filtered.slice().sort((a,b) => collator.compare(contactPrimary(a), contactPrimary(b)));
  } else if (state.contactSort === 'company') {
    filtered = filtered.slice().sort((a,b) => collator.compare(a.company || 'zzz', b.company || 'zzz'));
  } else if (state.contactSort === 'tasks') {
    filtered = filtered.slice().sort((a,b) => {
      const ao = tasksForContact(a.id).filter(t => t.status !== 'Erledigt').length;
      const bo = tasksForContact(b.id).filter(t => t.status !== 'Erledigt').length;
      return bo - ao;
    });
  }
  // bei 'trade' default: gruppiert anzeigen

  if (!filtered.length) {
    main.appendChild(el('div', { class: 'empty-state' }, icon('search_off', 'xl'), el('h3', {}, 'Keine Treffer')));
    if (state.isAdmin) main.appendChild(el('button', { class: 'btn primary mt-2', onClick: () => openContactEdit() }, icon('add', 'sm'), 'Neuer Kontakt'));
    return;
  }

  if (state.contactSort === 'trade') {
    // Gruppieren nach Gewerk
    const groups = {};
    filtered.forEach(c => {
      const k = c.trade || 'Ohne Gewerk';
      if (!groups[k]) groups[k] = [];
      groups[k].push(c);
    });
    Object.entries(groups).sort((a,b) => collator.compare(a[0], b[0])).forEach(([trade, list]) => {
      main.appendChild(
        el('div', { class: 'section' },
          el('div', { class: 'section-head' },
            el('h2', {}, icon('handyman'), trade),
            el('span', { class: 'badge' }, list.length + ' Kontakt' + (list.length !== 1 ? 'e' : ''))
          ),
          el('div', { class: 'contacts-grid' }, ...list.map(c => buildContactCard(c)))
        )
      );
    });
  } else {
    // Flache Liste
    main.appendChild(el('div', { class: 'section' },
      el('div', { class: 'contacts-grid' }, ...filtered.map(c => buildContactCard(c)))
    ));
  }

  if (state.isAdmin) {
    main.appendChild(el('button', { class: 'btn primary mt-2', onClick: () => openContactEdit() },
      icon('add', 'sm'), 'Neuer Kontakt'
    ));
  }
}

// ===== TIMELINE =====
function renderTimeline() {
  const main = $('#main');
  main.innerHTML = '';
  const withDate = state.tasks.filter(t => t.planned_end).sort((a,b) => new Date(a.planned_end) - new Date(b.planned_end));
  if (!withDate.length) {
    main.appendChild(el('div', { class: 'empty-state' },
      icon('event_busy', 'xl'),
      el('h3', {}, 'Keine Termine gepflegt'),
      el('div', { class: 'text-muted' }, 'Sobald Liefertermine eingetragen sind, erscheinen sie hier.')
    ));
    return;
  }
  const dates = withDate.map(t => new Date(t.planned_end).getTime());
  const min = Math.min(...dates), max = Math.max(...dates), range = max - min || 1;
  const tl = el('div', { class: 'timeline' });
  withDate.forEach(t => {
    const d = new Date(t.planned_end).getTime();
    const pct = ((d - min) / range) * 100;
    const cls = t.status === 'Erledigt' ? 'done' : (isTaskBlocked(t) ? 'blocked' : '');
    tl.appendChild(
      el('div', { class: 'timeline-row', onClick: () => openTaskDetail(t.id), style: 'cursor:pointer' },
        el('div', { class: 'timeline-task' },
          el('strong', {}, t.title),
          el('small', {}, (t.area || '—') + ' · ' + (t.floors||[]).join(', '))
        ),
        el('div', { class: 'timeline-bar-track' },
          el('div', { class: 'timeline-bar ' + cls, style: `left: ${Math.max(0, pct-3)}%` }, fmtDateShort(t.planned_end))
        )
      )
    );
  });
  main.appendChild(tl);
}

// ===== TASK DETAIL =====
function openTaskDetail(taskId) {
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return;
  const resp = contactById(t.responsible_id);
  const subs = subContacts(t);
  const tradeNames = [...new Set(subs.map(s => s.trade).filter(Boolean))];
  const deps = dependencies(t);
  const isDone = t.status === 'Erledigt';
  const blocked = isTaskBlocked(t) && !isDone;
  const comments = state.comments.filter(c => c.task_id === taskId);

  const depItems = deps.map(code => {
    const p = state.tasks.find(x => x.code === code);
    if (!p) return el('span', { class: 'floor-tag' }, '#' + code);
    return el('span', { class: 'status-pill ' + statusClass(p.status), style: 'cursor:pointer', onClick: (e) => { e.stopPropagation(); closeModal(); openTaskDetail(p.id); } }, p.title);
  });

  const body = el('div', {},
    el('dl', { class: 'task-detail-meta' },
      el('dt', {}, 'Stockwerk'), el('dd', {}, el('div', { class: 'floor-tags' }, ...(t.floors||[]).map(f => el('span', { class: 'floor-tag' }, f)))),
      el('dt', {}, 'Bereich'), el('dd', {}, t.area || '—'),
      el('dt', {}, 'Gewerk(e)'), el('dd', {}, tradeNames.length
        ? el('div', { class: 'floor-tags' }, ...tradeNames.map(tn => el('span', { class: 'floor-tag' }, tn)))
        : '—'),
      el('dt', {}, 'Verantwortlich'), el('dd', {}, resp ? buildContactPill(resp) : '—'),
      subs.length ? el('dt', {}, 'Ausführung') : null,
      subs.length ? el('dd', {}, el('div', { class: 'chip-list' }, ...subs.map(s => buildContactPill(s)))) : null,
      el('dt', {}, 'Abhängig von'), el('dd', {}, depItems.length ? el('div', { class: 'chip-list' }, ...depItems) : '—'),
      el('dt', {}, 'Aufwand'), el('dd', {}, t.effort_hours ? t.effort_hours + ' h' : '—'),
      el('dt', {}, 'Lieferfrist'), el('dd', {}, fmtDate(t.planned_end)),
      el('dt', {}, 'Status'), el('dd', {}, el('span', { class: 'status-pill ' + statusClass(blocked ? 'Blockiert' : t.status) }, blocked ? 'Blockiert' : t.status))
    ),
    t.notes ? el('div', { style: 'background: var(--bg-subtle); padding: 14px; border-radius: var(--radius-md); margin-bottom: 16px; font-size: 14px' },
      el('div', { class: 'text-muted text-sm mb-2' }, 'Notizen'),
      t.notes
    ) : null,
    el('div', { class: 'flex gap-2 mb-2', style: 'flex-wrap: wrap' },
      ...STATUS_LIST.map(s => el('button', { class: 'btn small' + (t.status === s ? ' primary' : ''), onClick: () => updateTaskStatus(t.id, s) }, s))
    ),
    el('div', { class: 'comments' },
      el('h3', {}, icon('forum', 'sm'), `Notizen (${comments.length})`),
      ...comments.map(c => el('div', { class: 'comment' },
        el('div', { class: 'comment-avatar', style: `background:${colorFromName(c.author)}` }, initials(c.author)),
        el('div', { class: 'comment-body' },
          el('div', { class: 'comment-meta' }, c.author + ' · ' + new Date(c.created_at).toLocaleString('de-CH', { dateStyle:'short', timeStyle:'short' })),
          el('div', { class: 'comment-text' }, c.body)
        )
      )),
      el('form', { class: 'comment-form', onSubmit: (e) => { e.preventDefault(); addComment(t.id, e.target); } },
        el('input', { type: 'text', name: 'body', placeholder: 'Notiz hinzufügen…', required: true }),
        el('button', { class: 'btn primary', type: 'submit' }, icon('send', 'sm'))
      )

  showModal(t.title, body, {
    actions: state.isAdmin ? [
      { label: 'Bearbeiten', ic: 'edit', cls: 'btn', onClick: () => { closeModal(); openTaskEdit(t); } },
      { label: 'Löschen', ic: 'delete', cls: 'btn danger', onClick: () => deleteTask(t.id) },

  }, true);
}

// ===== ACTIONS =====
async function toggleTaskDone(t) {
  await updateTaskStatus(t.id, t.status === 'Erledigt' ? 'Offen' : 'Erledigt');
}

async function updateTaskStatus(taskId, newStatus) {
  const t = state.tasks.find(x => x.id === taskId);
  if (!t || t.status === newStatus) return;
  const oldStatus = t.status;
  const actor = state.activeUser || (state.isAdmin ? 'Admin' : 'Gast');
  const update = { status: newStatus };
  if (newStatus === 'Erledigt') { update.completed_at = new Date().toISOString(); update.completed_by = actor; }
  else if (oldStatus === 'Erledigt') { update.completed_at = null; update.completed_by = null; }
  const { error } = await sb.from('tasks').update(update).eq('id', taskId);
  if (error) { toast('Fehler: ' + error.message, 'error'); return; }
  await sb.from('activity_log').insert({ task_id: taskId, actor, action: `Status: ${oldStatus} → ${newStatus}` });
  Object.assign(t, update);
  toast(`Status: ${newStatus}`);
  closeModal();
  render();
}

async function addComment(taskId, form) {
  const body = form.body.value.trim();
  if (!body) return;
  const author = state.activeUser || (state.isAdmin ? 'Admin' : 'Gast');
  const { data, error } = await sb.from('comments').insert({ task_id: taskId, author, body }).select().single();
  if (error) { toast('Fehler: ' + error.message, 'error'); return; }
  state.comments.unshift(data);
  await sb.from('activity_log').insert({ task_id: taskId, actor: author, action: 'Notiz hinzugefügt' });
  toast('Notiz gespeichert');
  closeModal();
  openTaskDetail(taskId);
}

async function deleteTask(taskId) {
  if (!confirm('Aufgabe wirklich löschen?')) return;
  const { error } = await sb.from('tasks').delete().eq('id', taskId);
  if (error) { toast('Fehler: ' + error.message, 'error'); return; }
  state.tasks = state.tasks.filter(t => t.id !== taskId);
  toast('Gelöscht');
  closeModal();
  render();
}

// ===== CSV =====
function exportCSV() {
  const rows = [['Titel','Bereich','Stockwerke','Gewerk(e)','Verantwortlich','Firma','Abhängig von','Aufwand h','Lieferfrist','Risiko','Status','Notizen']];
  state.tasks.forEach(t => {
    const r = contactById(t.responsible_id);
    const subs = subContacts(t);
    const trades = [...new Set(subs.map(s => s.trade).filter(Boolean))].join(', ');
    rows.push([
      t.title, t.area || '', (t.floors||[]).join('; '),
      trades || r?.trade || '',
      contactPrimary(r||{}) || '', r?.company || '',
      (t.depends_on_codes||[]).map(c => '#'+c).join('; '),
      t.effort_hours || '', t.planned_end || '', t.risk ?? '',
      t.status, (t.notes || '').replace(/\n/g,' ')
    ]);
  });
  const bom = '\uFEFF';
  const csv = bom + rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(';')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `oda-aufgaben-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('CSV exportiert');
}

// ===== MODAL =====
// Globaler Auto-Save Handler – wird beim Schließen ausgeführt
let pendingAutoSave = null;

function showModal(title, body, opts={}, wide=false) {
  closeModal();
  
  const overlay = el('div', { class: 'modal-overlay', id: 'modal-overlay' });
  // KEIN onClick auf Overlay mehr - kein versehentliches Schließen
  
  const closeBtn = el('button', { class: 'btn icon-only', onClick: () => closeModalWithSave() }, icon('close'));
  const modal = el('div', { class: 'modal' + (wide ? ' wide' : '') },
    el('div', { class: 'modal-header' },
      el('h2', {}, title),
      closeBtn
    ),
    el('div', { class: 'modal-body' }, body),
    opts.actions?.length ? el('div', { class: 'modal-footer' },
      ...opts.actions.map(a => el('button', { 
        class: a.cls, 
        'data-primary': a.primary ? '1' : null,
        onClick: a.onClick 
      }, a.ic ? icon(a.ic, 'sm') : null, a.label))
    ) : null
  );
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  
  // Auto-Save Handler registrieren
  pendingAutoSave = opts.onAutoSave || null;
  
  // Enter-Taste in Inputs (außer Textareas) löst Primary-Action aus
  modal.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'BUTTON') {
      const primary = modal.querySelector('[data-primary="1"]');
      if (primary) {
        e.preventDefault();
        primary.click();
      }
    }
    if (e.key === 'Escape') {
      e.preventDefault();
      closeModalWithSave();
    }
  });
  
  // Erstes Input/Textarea fokussieren
  setTimeout(() => {
    const firstInput = modal.querySelector('input:not([type=hidden]), textarea, select');
    if (firstInput) firstInput.focus();
  }, 100);
}

async function closeModalWithSave() {
  if (pendingAutoSave) {
    try {
      await pendingAutoSave();
    } catch(e) { console.error('Auto-save failed:', e); }
    pendingAutoSave = null;
  }
  closeModal();
}

function closeModal() { 
  pendingAutoSave = null;
  const o = $('#modal-overlay'); 
  if (o) o.remove(); 
}

        ...state.contacts.map(c => {
          const lbl = contactPrimary(c) + (c.trade ? ' (' + c.trade + ')' : '');
          return el('option', { value: c.id, selected: state.activeUserId === c.id }, lbl);
        })
      )
    ),
    el('div', { class: 'form-group' },
      el('label', {}, 'Admin-Code (optional)'),
      el('input', { id: 'login-code', type: 'password', placeholder: 'Für Bearbeitungsrechte' })
    ),
    state.isAdmin ? el('div', { style: 'padding: 10px 14px; background: var(--sys-success); color: white; border-radius: var(--radius-md); display: flex; align-items: center; gap: 8px; font-size: 14px' }, icon('verified_user', 'sm'), 'Du bist als Admin eingeloggt') : null
  );
  showModal('Login', body, {
    actions: [
      ...(state.activeUserId ? [{ label: 'Abmelden', ic: 'logout', cls: 'btn', onClick: () => {
        state.activeUser = null;
        state.activeUserId = null;
        localStorage.removeItem('oda-user');
        localStorage.removeItem('oda-user-id');
        toast('Abgemeldet');
        closeModal(); render();
      }}] : []),
      ...(state.isAdmin ? [{ label: 'Admin-Logout', ic: 'admin_panel_settings', cls: 'btn', onClick: () => {
        state.isAdmin = false;
        localStorage.removeItem('oda-admin');
        toast('Admin abgemeldet');
        closeModal(); render();
      }}] : []),
      { label: 'Bestätigen', ic: 'check', cls: 'btn primary', primary: true, onClick: () => {
        const userId = $('#login-user').value;
        const code = $('#login-code').value;
        if (userId) {
          const c = contactById(userId);
          const lbl = c ? (contactPrimary(c) + (c.trade ? ' (' + c.trade + ')' : '')) : '';
          state.activeUser = lbl;
          state.activeUserId = userId;
          localStorage.setItem('oda-user', lbl);
          localStorage.setItem('oda-user-id', userId);
        }
        if (code) {
          if (code === ADMIN_CODE) {
            state.isAdmin = true;
            localStorage.setItem('oda-admin', '1');
            toast('Admin aktiviert');
          } else { toast('Falscher Admin-Code', 'error'); return; }
        }
        closeModal(); render();
      }}
    ]
  });
}

function toggleTheme() {
  const isDark = document.documentElement.classList.toggle('dark');
  document.body.classList.toggle('dark', isDark);
  localStorage.setItem('oda-theme', isDark ? 'dark' : 'light');
  updateHeader();
}

function render() {
  updateHeader();
  $$('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === state.currentView));
  if (state.currentView !== 'contacts') state.contactDetail = null;
  switch (state.currentView) {
    case 'dashboard': renderDashboard(); break;
    case 'tasks': renderTasks(); break;
    case 'kanban': renderKanban(); break;
    case 'floors': renderFloors(); break;
    case 'trades': renderTrades(); break;
    case 'contacts': renderContacts(); break;
    case 'timeline': renderTimeline(); break;
    case 'activity': renderActivity(); break;
  }
  const existingFab = $('#fab');
  if (existingFab) existingFab.remove();
  if (state.isAdmin && ['dashboard','tasks','kanban','floors','trades','timeline'].includes(state.currentView)) {
    const fab = el('button', { class: 'fab', id: 'fab', title: 'Neue Aufgabe', onClick: openTaskNew }, icon('add'));
    document.body.appendChild(fab);
  }
}

async function init() {
  if (localStorage.getItem('oda-admin') === '1') state.isAdmin = true;
  const savedUser = localStorage.getItem('oda-user');
  if (savedUser) state.activeUser = savedUser;
  const savedUserId = localStorage.getItem('oda-user-id');
  if (savedUserId) state.activeUserId = savedUserId;
  if (localStorage.getItem('oda-theme') === 'dark') {
    document.documentElement.classList.add('dark');
    document.body.classList.add('dark');
  }
  loadState();
  $$('.tab').forEach(t => t.addEventListener('click', () => {
    state.currentView = t.dataset.view;
    saveState();
    render();
  }));
  $('#login-btn').addEventListener('click', openLogin);
  $('#theme-btn').addEventListener('click', toggleTheme);
  $('#theme-fab').addEventListener('click', toggleTheme);
  
  // Beim Resize Header neu rendern (für Mobile-Layout)
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(updateHeader, 150);
  });

  try {
    await loadAll();
    render();
  } catch (err) {
    $('#main').innerHTML = `<div class="empty-state"><h3>Fehler beim Laden</h3><pre>${escape(err.message)}</pre></div>`;
    console.error(err);
  }
  if (!state.activeUser && !state.isAdmin) setTimeout(openLogin, 600);
}

init();
</script>
</body>
</html>
